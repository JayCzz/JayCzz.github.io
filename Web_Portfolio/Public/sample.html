<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JCEspina</title>
  <link rel="stylesheet" href="css/sample.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">JC Espina <span class="text-primary">Portfolio</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav gap-4">
          <li class="nav-item"><a class="nav-link scroll-link active" href="#home">Home</a></li>
          <li class="nav-item"><a class="nav-link scroll-link" href="#services">Skills</a></li>
          <li class="nav-item"><a class="nav-link scroll-link" href="#projects">Projects</a></li>
          <li class="nav-item"><a class="nav-link scroll-link" href="#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>


  <footer class="text-center py-3">
    <div class="container">
      &copy; 2025 MyPortfolio. All rights reserved.
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
  <script>
    var swiper = new Swiper(".mySwiper", {
      slidesPerView: "auto",
      spaceBetween: 30,
      freeMode: true,
      loop: false, // Do not use loop with freeMode + autoplay
      speed: 4000,
      autoplay: {
        delay: 0,
        disableOnInteraction: false,
      },
      grabCursor: true,
    });
  </script>
</body>

</html>
